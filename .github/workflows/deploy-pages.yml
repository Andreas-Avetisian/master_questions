name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            exporter/package-lock.json
            web/package-lock.json

      - name: Install exporter deps
        run: npm ci --prefix exporter

      - name: Export vault → data/questions.json
        run: npm run export

      - name: Install web deps
        run: npm ci --prefix web

      - name: Build web
        run: npm run build --prefix web
        env:
          # Custom domain, no subpath.
          BASE_PATH: ""

      - name: SPA fallback + CNAME
        run: |
          cp web/build/index.html web/build/404.html
          echo "study.qtq.at" > web/build/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
