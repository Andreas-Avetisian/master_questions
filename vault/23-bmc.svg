<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Business Model Canvas</title>
  <desc id="desc">Diagram of the Business Model Canvas showing its nine building blocks with the correct spanning layout.</desc>
  <style>
    .box { stroke: #333; stroke-width: 3; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #222; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #222; }
  </style>

  <rect x="20" y="20" width="1060" height="720" rx="6" ry="6" fill="#fffdf7" stroke="#333" stroke-width="4" />

  <rect class="box" x="40" y="40" width="180" height="500" fill="#cfe87a" />
  <rect class="box" x="220" y="40" width="190" height="250" fill="#f9c15c" />
  <rect class="box" x="220" y="290" width="190" height="250" fill="#f6d56d" />
  <rect class="box" x="410" y="40" width="260" height="500" fill="#8ed8de" />
  <rect class="box" x="670" y="40" width="190" height="250" fill="#f4cf64" />
  <rect class="box" x="670" y="290" width="190" height="250" fill="#f6b65d" />
  <rect class="box" x="860" y="40" width="200" height="500" fill="#cfe87a" />

  <rect class="box" x="40" y="540" width="520" height="180" fill="#f6c2b9" />
  <rect class="box" x="560" y="540" width="500" height="180" fill="#f3debb" />

  <text class="label" x="130" y="90" text-anchor="middle">Key Partners</text>

  <text class="label" x="315" y="90" text-anchor="middle">Key Activities</text>

  <text class="label" x="315" y="340" text-anchor="middle">Key Resources</text>

  <text class="label" x="540" y="90" text-anchor="middle">Value</text>
  <text class="label" x="540" y="126" text-anchor="middle">Proposition</text>

  <text class="small" x="765" y="86" text-anchor="middle">Customer</text>
  <text class="small" x="765" y="118" text-anchor="middle">Relationships</text>

  <text class="label" x="765" y="340" text-anchor="middle">Channels</text>

  <text class="small" x="960" y="86" text-anchor="middle">Customer</text>
  <text class="small" x="960" y="118" text-anchor="middle">Segments</text>

  <text class="label" x="300" y="595" text-anchor="middle">Cost Structure</text>

  <text class="label" x="810" y="595" text-anchor="middle">Revenue Streams</text>
</svg>
